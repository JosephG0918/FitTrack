<VirtualHost *:80>
    ServerName localhost
    
    WSGIDaemonProcess flaskapp user=www-data group=www-data threads=5
    WSGIScriptAlias / /var/www/workout_webapp/app.wsgi   

    WSGIProcessGroup flaskapp

    <Directory /var/www/workout_webapp>
        Require all granted
    </Directory>

    <Directory /var/www/workout_webapp/static/>
        Require all granted
    </Directory>

    ErrorLog /var/www/workout_webapp/logs/error.log
    CustomLog /var/www/workout_webapp/logs/access.log combined
</VirtualHost>